<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado SAAE Passos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #004aad; --accent: #ffcc00; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7fa; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; background: var(--primary); color: white; padding: 50px 0 80px; text-align: center; }
        .container { width: 90%; max-width: 700px; margin-top: -50px; background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .content { padding: 30px; }
        .badge { background: #eef2f7; color: var(--primary); padding: 5px 15px; border-radius: 50px; font-weight: 700; font-size: 0.8rem; }
        h2 { font-family: 'Poppins'; color: #333; margin: 20px 0; }
        .option { border: 2px solid #eee; padding: 15px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; transition: 0.2s; }
        .option:hover { border-color: var(--primary); background: #f9fbff; }
        .option.selected { border-color: var(--primary); background: #f0f7ff; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .btn-confirm { background: var(--primary); color: white; }
        .btn-next { background: var(--success); color: white; display: none; }
        .feedback { display: none; padding: 20px; border-radius: 12px; margin-top: 20px; animation: fadeIn 0.3s; }
        .feedback.correct { background: #d4edda; color: #155724; border-left: 5px solid var(--success); }
        .feedback.wrong { background: #f8d7da; color: #721c24; border-left: 5px solid var(--danger); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <header>
        <i class="fa-solid fa-droplet" style="font-size: 2.5rem; color: var(--accent);"></i>
        <h1>SAAE PASSOS</h1>
        <p>Simulado Preparatório - V2</p>
    </header>
    <div class="container">
        <div class="content">
            <span class="badge" id="tag">CARREGANDO...</span>
            <h2 id="enunciado">Preparando questões...</h2>
            <div id="options"></div>
            <button class="btn btn-confirm" id="btnAction" onclick="verificar()">Confirmar Resposta</button>
            <div id="feedback" class="feedback">
                <strong id="fStatus"></strong>
                <div id="explicacao" style="margin-top: 10px; font-size: 0.9rem;"></div>
                <button class="btn btn-next" id="btnNext" onclick="proxima()">Próxima Questão</button>
                <button class="btn btn-confirm" id="btnRetry" style="display:none; background: #666;" onclick="tentarNovamente()">Tentar Novamente</button>
            </div>
        </div>
    </div>
    <script>
        async function carregar() {
            const res = await fetch('/questao');
            const q = await res.json();
            if (q.fim) { finalizar(); return; }
            document.getElementById('tag').innerText = q.disciplina;
            document.getElementById('enunciado').innerText = q.enunciado;
            const list = document.getElementById('options');
            list.innerHTML = '';
            for (let letra in q.alternativas) {
                list.innerHTML += `<label class="option" onclick="selecionar(this)"><input type="radio" name="resp" value="${letra}" style="display:none"><strong>${letra})</strong> ${q.alternativas[letra]}</label>`;
            }
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('btnAction').style.display = 'block';
            document.getElementById('btnNext').style.display = 'none';
            document.getElementById('btnRetry').style.display = 'none';
        }

        function selecionar(el) {
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            el.querySelector('input').checked = true;
        }

        async function verificar() {
            const sel = document.querySelector('input[name="resp"]:checked');
            if (!sel) return;
            const res = await fetch('/responder', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ resposta: sel.value })
            });
            const dados = await res.json();
            const f = document.getElementById('feedback');
            f.style.display = 'block';
            f.className = dados.correta ? 'feedback correct' : 'feedback wrong';
            document.getElementById('fStatus').innerText = dados.mensagem;
            
            // Removemos a "Dica do Professor" e mostramos apenas a explicação real no acerto
            document.getElementById('explicacao').innerHTML = dados.correta ? dados.explicacao : "";

            if (dados.correta) {
                document.getElementById('btnAction').style.display = 'none';
                document.getElementById('btnNext').style.display = 'block';
                document.getElementById('btnRetry').style.display = 'none';
            } else {
                document.getElementById('btnAction').style.display = 'none';
                document.getElementById('btnNext').style.display = 'none';
                document.getElementById('btnRetry').style.display = 'block';
            }
        }

        function tentarNovamente() {
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('btnAction').style.display = 'block';
            document.getElementById('btnRetry').style.display = 'none';
            // Desmarca a opção anterior para obrigar nova escolha
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            document.querySelectorAll('input[name="resp"]').forEach(i => i.checked = false);
        }

        function proxima() { carregar(); }
        
        function finalizar() {
            document.querySelector('.content').innerHTML = "<div style='text-align:center'><h2>Parabéns!</h2><p>Você concluiu o simulado V2.</p><button class='btn btn-confirm' onclick='location.reload()'>Reiniciar</button></div>";
        }
        carregar();
    </script>
</body>
</html>
