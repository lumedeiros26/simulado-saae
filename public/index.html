<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado SAAE Passos |</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Elementos decorativos laterais */
.decoration {
    position: fixed;
    font-size: 5rem;
    color: rgba(0, 74, 173, 0.05); /* Azul bem clarinho e transparente */
    z-index: -1; /* Fica atrás de tudo */
    pointer-events: none; /* Não atrapalha o clique */
}

.dec-1 { top: 10%; left: 5%; transform: rotate(-15deg); }
.dec-2 { bottom: 15%; left: 8%; transform: rotate(10deg); }
.dec-3 { top: 20%; right: 5%; transform: rotate(20deg); }
.dec-4 { bottom: 10%; right: 8%; transform: rotate(-10deg); }

/* Ajuste para sumir em telas de celular muito pequenas se necessário */
@media (max-width: 900px) {
    .decoration { display: none; }
}
        :root { --primary: #004aad; --accent: #ffcc00; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7fa; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        header { width: 100%; background: var(--primary); color: white; padding: 50px 0 80px; text-align: center; }
        header h1 { font-family: 'Poppins'; margin: 10px 0; font-size: 2.2rem; }
        
        .container { width: 90%; max-width: 700px; margin-top: -50px; background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .content { padding: 35px; }
        
        .badge { background: #eef2f7; color: var(--primary); padding: 6px 16px; border-radius: 50px; font-weight: 700; font-size: 0.85rem; }
        h2 { font-family: 'Poppins'; color: #333; margin: 25px 0; line-height: 1.5; font-size: 1.3rem; }
        
        .option { border: 2px solid #eee; padding: 15px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 12px; transition: 0.2s; font-weight: 500; }
        .option:hover { border-color: var(--primary); background: #f9fbff; }
        .option.selected { border-color: var(--primary); background: #f0f7ff; }

        /* Estilo exato dos botões da Versão 1 */
        .btn { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-family: 'Poppins'; 
            font-weight: 700; 
            font-size: 1.1rem; 
            cursor: pointer; 
            margin-top: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            transition: transform 0.2s, background 0.2s; 
        }
        .btn:active { transform: scale(0.98); }
        
        .btn-confirm { background: var(--primary); color: white; }
        .btn-confirm:hover { background: #003a8c; }
        
        .btn-next { background: var(--success); color: white; display: none; }
        .btn-next:hover { background: #219150; }
        
        .btn-retry { background: #666; color: white; display: none; }
        .btn-retry:hover { background: #444; }

        .feedback { display: none; padding: 25px; border-radius: 15px; margin-top: 25px; animation: fadeIn 0.3s; }
        .feedback.correct { background: #d4edda; color: #155724; border-left: 6px solid var(--success); }
        .feedback.wrong { background: #f8d7da; color: #721c24; border-left: 6px solid var(--danger); }
        .explanation-text { margin-top: 10px; font-size: 0.95rem; line-height: 1.4; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <header>
        <i class="fa-solid fa-droplet" style="font-size: 2.5rem; color: var(--accent);"></i>
        <h1>SAAE PASSOS</h1>
        <p>Agente Administrativo | Simulado | Lele Piantino</p>
    </header>

    <div class="container">
        <div class="content" id="quizBody">
            <span class="badge" id="tag">CARREGANDO...</span>
            <h2 id="enunciado">Carregando sua próxima questão...</h2>
            
            <div id="options"></div>

            <button class="btn btn-confirm" id="btnAction" onclick="verificar()">
                <i class="fa-solid fa-circle-check"></i> Confirmar Resposta
            </button>

            <div id="feedback" class="feedback">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <i id="fIcon" class="fa-solid" style="font-size: 1.4rem;"></i>
                    <strong id="fStatus"></strong>
                </div>
                <div id="explicacao" class="explanation-text"></div>
                
                <button class="btn btn-next" id="btnNext" onclick="proxima()">
                    Próxima Questão <i class="fa-solid fa-arrow-right"></i>
                </button>
                
                <button class="btn btn-retry" id="btnRetry" onclick="tentarNovamente()">
                    <i class="fa-solid fa-rotate-left"></i> Tentar Novamente
                </button>
            </div>
        </div>
    </div>

    <script>
        async function carregar() {
            const res = await fetch('/questao');
            const q = await res.json();
            if (q.fim) { finalizar(); return; }
            
            document.getElementById('tag').innerText = q.disciplina;
            document.getElementById('enunciado').innerText = q.enunciado;
            const list = document.getElementById('options');
            list.innerHTML = '';
            
            for (let letra in q.alternativas) {
                list.innerHTML += `
                    <label class="option" onclick="selecionar(this)">
                        <input type="radio" name="resp" value="${letra}" style="display:none">
                        <strong>${letra})</strong> ${q.alternativas[letra]}
                    </label>`;
            }
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('btnAction').style.display = 'flex';
            document.getElementById('btnNext').style.display = 'none';
            document.getElementById('btnRetry').style.display = 'none';
        }

        function selecionar(el) {
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            el.querySelector('input').checked = true;
        }

        async function verificar() {
            const sel = document.querySelector('input[name="resp"]:checked');
            if (!sel) return;

            const res = await fetch('/responder', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ resposta: sel.value })
            });
            const dados = await res.json();
            
            const f = document.getElementById('feedback');
            f.style.display = 'block';
            f.className = dados.correta ? 'feedback correct' : 'feedback wrong';
            
            document.getElementById('fStatus').innerText = dados.mensagem;
            document.getElementById('fIcon').className = dados.correta ? 'fa-solid fa-check-circle' : 'fa-solid fa-times-circle';
            document.getElementById('explicacao').innerHTML = dados.correta ? dados.explicacao : "";
            
            document.getElementById('btnAction').style.display = 'none';

            if (dados.correta) {
                document.getElementById('btnNext').style.display = 'flex';
                document.getElementById('btnRetry').style.display = 'none';
            } else {
                document.getElementById('btnNext').style.display = 'none';
                document.getElementById('btnRetry').style.display = 'flex';
            }
        }

        function tentarNovamente() {
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('btnAction').style.display = 'flex';
            document.getElementById('btnRetry').style.display = 'none';
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            document.querySelectorAll('input[name="resp"]').forEach(i => i.checked = false);
        }

        function proxima() { carregar(); }
        
        function finalizar() {
            document.getElementById('quizBody').innerHTML = `
                <div style="text-align:center; padding: 20px 0;">
                    <i class="fa-solid fa-trophy" style="font-size: 4rem; color: #ffcc00;"></i>
                    <h2>Excelente Trabalho!</h2>
                    <p>Você concluiu o Simulado V2 com as questões da IBGP.</p>
                    <button class="btn btn-confirm" onclick="location.reload()">Reiniciar Simulado</button>
                </div>`;
        }
        carregar();
    </script>
</body>
</html>
