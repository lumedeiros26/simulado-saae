<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado SAAE Passos | V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #004aad; --accent: #ffcc00; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7fa; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Figuras Coloridas e Vibrantes nas Laterais */
        .decoration {
            position: fixed;
            font-size: 11rem; 
            z-index: -1;
            pointer-events: none;
            opacity: 0.7; /* Agora bem visíveis e coloridas */
            filter: drop-shadow(4px 4px 10px rgba(0,0,0,0.1));
        }
        /* Cores sólidas para cada tema */
        .dec-1 { top: 10%; left: 1%; color: #3498db; transform: rotate(-15deg); } /* Água */
        .dec-2 { bottom: 10%; left: 2%; color: #f39c12; transform: rotate(10deg); } /* Administração */
        .dec-3 { top: 12%; right: 1%; color: #9b59b6; transform: rotate(20deg); } /* Raciocínio Lógico */
        .dec-4 { bottom: 12%; right: 2%; color: #e74c3c; transform: rotate(-10deg); } /* Direito/Lei */

        header { width: 100%; background: var(--primary); color: white; padding: 50px 0 80px; text-align: center; position: relative; }
        header h1 { font-family: 'Poppins'; margin: 10px 0; font-size: 2.5rem; }
        
        .container { 
            width: 90%; 
            max-width: 700px; 
            margin-top: -50px; 
            background: white; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); 
            overflow: hidden; 
            margin-bottom: 50px; 
            position: relative;
        }
        
        /* O segredo para descer o título está aqui no padding-top */
        .content { padding: 70px 45px 45px 45px; }
        
        .badge { 
            background: #004aad; 
            color: #ffffff; 
            padding: 12px 25px; 
            border-radius: 50px; 
            font-weight: 800; 
            font-size: 1.1rem; 
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,74,173,0.2);
        }

        h2 { font-family: 'Poppins'; color: #333; margin: 10px 0 35px 0; line-height: 1.5; font-size: 1.5rem; }
        
        .option { border: 2px solid #eee; padding: 20px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 15px; margin-bottom: 15px; transition: 0.2s; font-weight: 600; font-size: 1.1rem; background: #fff; }
        .option:hover { border-color: var(--primary); background: #f9fbff; }
        .option.selected { border-color: var(--primary); background: #f0f7ff; box-shadow: 0 4px 12px rgba(0,74,173,0.1); }

        .btn { 
            width: 100%; padding: 20px; border: none; border-radius: 14px; font-family: 'Poppins'; 
            font-weight: 700; font-size: 1.2rem; cursor: pointer; margin-top: 30px; 
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; 
        }
        .btn-confirm { background: var(--primary); color: white; }
        .btn-confirm:hover { background: #003a8c; transform: translateY(-3px); }
        
        .btn-next { background: var(--success); color: white; display: none; }
        .btn-retry { background: #666; color: white; display: none; }

        .feedback { display: none; padding: 30px; border-radius: 18px; margin-top: 30px; animation: fadeIn 0.4s ease-out; }
        .feedback.correct { background: #d4edda; color: #155724; border-left: 10px solid var(--success); }
        .feedback.wrong { background: #f8d7da; color: #721c24; border-left: 10px solid var(--danger); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Em telas menores que 1200px as figuras laterais sumirão para não atrapalhar */
        @media (max-width: 1200px) { .decoration { display: none; } }
    </style>
</head>
<body>

    <!-- Figuras Coloridas Estáticas -->
    <i class="fa-solid fa-faucet-drip decoration dec-1"></i> <!-- Água -->
    <i class="fa-solid fa-briefcase decoration dec-2"></i> <!-- Administrativo -->
    <i class="fa-solid fa-calculator decoration dec-3"></i> <!-- Matemática/RLM -->
    <i class="fa-solid fa-gavel decoration dec-4"></i> <!-- Legislação -->

    <header>
        <i class="fa-solid fa-droplet" style="font-size: 3.5rem; color: var(--accent);"></i>
        <h1>SAAE PASSOS</h1>
        <p>Simulado Agente Administrativo | Lele Piantino</p>
    </header>

    <div class="container">
        <div class="content" id="quizBody">
            <div style="text-align: left;">
                <span class="badge" id="tag">CARREGANDO...</span>
            </div>
            
            <h2 id="enunciado">Carregando questão...</h2>
            
            <div id="options"></div>

            <button class="btn btn-confirm" id="btnAction" onclick="verificar()">
                <i class="fa-solid fa-circle-check"></i> Confirmar Resposta
            </button>

            <div id="feedback" class="feedback">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <i id="fIcon" class="fa-solid" style="font-size: 2.2rem;"></i>
                    <strong id="fStatus" style="font-size: 1.3rem;"></strong>
                </div>
                <div id="explicacao" style="margin-top: 20px; font-size: 1.1rem; line-height: 1.6;"></div>
                
                <button class="btn btn-next" id="btnNext" onclick="proxima()">
                    Próxima Questão <i class="fa-solid fa-arrow-right"></i>
                </button>
                
                <button class="btn btn-retry" id="btnRetry" onclick="tentarNovamente()">
                    <i class="fa-solid fa-rotate-left"></i> Tentar Novamente
                </button>
            </div>
        </div>
    </div>

    <script>
        async function carregar() {
            const res = await fetch('/questao');
            const q = await res.json();
            if (q.fim) { finalizar(); return; }
            
            document.getElementById('tag').innerText = q.disciplina;
            document.getElementById('enunciado').innerText = q.enunciado;
            const list = document.getElementById('options');
            list.innerHTML = '';
            
            for (let letra in q.alternativas) {
                list.innerHTML += `
                    <label class="option" onclick="selecionar(this)">
                        <input type="radio" name="resp" value="${letra}" style="display:none">
                        <strong>${letra})</strong> ${q.alternativas[letra]}
                    </label>`;
            }
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('btnAction').style.display = 'flex';
            document.getElementById('btnNext').style.display = 'none';
            document.getElementById('btnRetry').style.display = 'none';
        }

        function selecionar(el) {
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            el.querySelector('input').checked = true;
        }

        async function verificar() {
            const sel = document.querySelector('input[name="resp"]:checked');
            if (!sel) return;

            const res = await fetch('/responder', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ resposta: sel.value })
            });
            const dados = await res.json();
            
            const f = document.getElementById('feedback');
            f.style.display = 'block';
            f.className = dados.correta ? 'feedback correct' : 'feedback wrong';
            
            document.getElementById('fStatus').innerText = dados.mensagem;
            document.getElementById('fIcon').className = dados.correta ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-xmark';
            document.getElementById('explicacao').innerHTML = dados.correta ? dados.explicacao : "";
            
            document.getElementById('btnAction').style.display = 'none';

            if (dados.correta) {
                document.getElementById('btnNext').style.display = 'flex';
                document.getElementById('btnRetry').style.display = 'none';
            } else {
                document.getElementById('btnNext').style.display = 'none';
                document.getElementById('btnRetry').style.display = 'flex';
            }
        }

        function tentarNovamente() {
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('btnAction').style.display = 'flex';
            document.getElementById('btnRetry').style.display = 'none';
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            document.querySelectorAll('input[name="resp"]').forEach(i => i.checked = false);
        }

        function proxima() { carregar(); }
        
        function finalizar() {
            document.getElementById('quizBody').innerHTML = `
                <div style="text-align:center; padding: 40px 0;">
                    <i class="fa-solid fa-medal" style="font-size: 6rem; color: #ffcc00;"></i>
                    <h2 style="margin-top: 30px;">Parabéns, Luiza!</h2>
                    <p style="font-size: 1.2rem; color: #666;">Simulado concluído. Você está pronta para o SAAE!</p>
                    <button class="btn btn-confirm" onclick="location.reload()">Reiniciar Simulado</button>
                </div>`;
        }
        carregar();
    </script>
</body>
</html>
