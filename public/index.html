<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado SAAE Passos | V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #004aad; --accent: #ffcc00; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7fa; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Elementos decorativos laterais (Mais chamativos e parados) */
        .decoration {
            position: fixed;
            font-size: 12rem; /* Figuras maiores */
            color: rgba(0, 74, 173, 0.12); /* Opacidade aumentada para aparecer mais */
            z-index: -1;
            pointer-events: none;
        }
        /* Posições fixas nas laterais */
        .dec-1 { top: 5%; left: 2%; transform: rotate(-10deg); }
        .dec-2 { bottom: 5%; left: 2%; transform: rotate(10deg); }
        .dec-3 { top: 5%; right: 2%; transform: rotate(15deg); }
        .dec-4 { bottom: 5%; right: 2%; transform: rotate(-15deg); }

        header { width: 100%; background: var(--primary); color: white; padding: 50px 0 80px; text-align: center; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        header h1 { font-family: 'Poppins'; margin: 10px 0; font-size: 2.5rem; }
        
        .container { width: 90%; max-width: 700px; margin-top: -50px; background: white; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 50px; border: 1px solid rgba(0,0,0,0.05); }
        .content { padding: 40px; }
        
        .badge { background: #eef2f7; color: var(--primary); padding: 8px 18px; border-radius: 50px; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; }
        h2 { font-family: 'Poppins'; color: #333; margin: 25px 0; line-height: 1.4; font-size: 1.4rem; }
        
        .option { border: 2px solid #eee; padding: 18px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 14px; margin-bottom: 14px; transition: 0.2s; font-weight: 500; font-size: 1.05rem; }
        .option:hover { border-color: var(--primary); background: #f9fbff; }
        .option.selected { border-color: var(--primary); background: #f0f7ff; box-shadow: 0 4px 10px rgba(0,74,173,0.1); }

        .btn { 
            width: 100%; padding: 18px; border: none; border-radius: 14px; font-family: 'Poppins'; 
            font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-top: 25px; 
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; 
        }
        .btn-confirm { background: var(--primary); color: white; }
        .btn-confirm:hover { background: #003a8c; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,74,173,0.3); }
        
        .btn-next { background: var(--success); color: white; display: none; }
        .btn-retry { background: #5a6268; color: white; display: none; }

        .feedback { display: none; padding: 30px; border-radius: 18px; margin-top: 30px; animation: fadeIn 0.4s ease-out; }
        .feedback.correct { background: #d4edda; color: #155724; border-left: 8px solid var(--success); }
        .feedback.wrong { background: #f8d7da; color: #721c24; border-left: 8px solid var(--danger); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Em tablets e celulares, as figuras laterais sumirão para não poluir o conteúdo */
        @media (max-width: 1100px) { .decoration { display: none; } }
    </style>
</head>
<body>

    <!-- Ícones Decorativos Maiores e Mais Visíveis -->
    <i class="fa-solid fa-faucet-drip decoration dec-1"></i>
    <i class="fa-solid fa-briefcase decoration dec-2"></i>
    <i class="fa-solid fa-calculator decoration dec-3"></i>
    <i class="fa-solid fa-gavel decoration dec-4"></i>

    <header>
        <i class="fa-solid fa-droplet" style="font-size: 3rem; color: var(--accent);"></i>
        <h1>SAAE PASSOS</h1>
        <p>Simulado Preparatório | Agente Administrativo | Lele Piantino</p>
    </header>

    <div class="container">
        <div class="content" id="quizBody">
            <span class="badge" id="tag">CARREGANDO...</span>
            <h2 id="enunciado">Buscando questão no edital...</h2>
            
            <div id="options"></div>

            <button class="btn btn-confirm" id="btnAction" onclick="verificar()">
                <i class="fa-solid fa-check-double"></i> Confirmar Resposta
            </button>

            <div id="feedback" class="feedback">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <i id="fIcon" class="fa-solid" style="font-size: 2rem;"></i>
                    <strong id="fStatus" style="font-size: 1.2rem;"></strong>
                </div>
                <div id="explicacao" style="margin-top: 15px; font-size: 1rem; line-height: 1.5;"></div>
                
                <button class="btn btn-next" id="btnNext" onclick="proxima()">
                    Próxima Questão <i class="fa-solid fa-arrow-right-icon"></i>
                </button>
                
                <button class="btn btn-retry" id="btnRetry" onclick="tentarNovamente()">
                    <i class="fa-solid fa-rotate-right"></i> Tentar Novamente
                </button>
            </div>
        </div>
    </div>

    <script>
        async function carregar() {
            const res = await fetch('/questao');
            const q = await res.json();
            if (q.fim) { finalizar(); return; }
            
            document.getElementById('tag').innerText = q.disciplina;
            document.getElementById('enunciado').innerText = q.enunciado;
            const list = document.getElementById('options');
            list.innerHTML = '';
            
            for (let letra in q.alternativas) {
                list.innerHTML += `
                    <label class="option" onclick="selecionar(this)">
                        <input type="radio" name="resp" value="${letra}" style="display:none">
                        <strong>${letra})</strong> ${q.alternativas[letra]}
                    </label>`;
            }
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('btnAction').style.display = 'flex';
            document.getElementById('btnNext').style.display = 'none';
            document.getElementById('btnRetry').style.display = 'none';
        }

        function selecionar(el) {
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            el.querySelector('input').checked = true;
        }

        async function verificar() {
            const sel = document.querySelector('input[name="resp"]:checked');
            if (!sel) return;

            const res = await fetch('/responder', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ resposta: sel.value })
            });
            const dados = await res.json();
            
            const f = document.getElementById('feedback');
            f.style.display = 'block';
            f.className = dados.correta ? 'feedback correct' : 'feedback wrong';
            
            document.getElementById('fStatus').innerText = dados.mensagem;
            document.getElementById('fIcon').className = dados.correta ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-xmark';
            document.getElementById('explicacao').innerHTML = dados.correta ? dados.explicacao : "";
            
            document.getElementById('btnAction').style.display = 'none';

            if (dados.correta) {
                document.getElementById('btnNext').style.display = 'flex';
                document.getElementById('btnRetry').style.display = 'none';
            } else {
                document.getElementById('btnAction').style.display = 'none';
                document.getElementById('btnNext').style.display = 'none';
                document.getElementById('btnRetry').style.display = 'flex';
            }
        }

        function tentarNovamente() {
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('btnAction').style.display = 'flex';
            document.getElementById('btnRetry').style.display = 'none';
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            document.querySelectorAll('input[name="resp"]').forEach(i => i.checked = false);
        }

        function proxima() { carregar(); }
        
        function finalizar() {
            document.getElementById('quizBody').innerHTML = `
                <div style="text-align:center; padding: 30px 0;">
                    <i class="fa-solid fa-medal" style="font-size: 5rem; color: #ffcc00;"></i>
                    <h2 style="margin-top: 20px;">Simulado Concluído!</h2>
                    <p style="font-size: 1.1rem;">Você está cada vez mais perto da sua vaga no SAAE.</p>
                    <button class="btn btn-confirm" onclick="location.reload()">Reiniciar Simulado</button>
                </div>`;
        }
        carregar();
    </script>
</body>
</html>
