<!-- No seu CSS do index.html -->
<style>
    .decoration {
        position: fixed;
        font-size: 10rem;
        z-index: -1;
        opacity: 0.6; /* Figuras bem visíveis */
        filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.1));
    }
    /* Cores vivas para cada ícone */
    .dec-agua { top: 10%; left: 2%; color: #00b4d8; }
    .dec-lei { bottom: 10%; left: 3%; color: #d00000; }
    .dec-logica { top: 15%; right: 2%; color: #ffb703; }
    .dec-adm { bottom: 15%; right: 3%; color: #38b000; }
</style>

<!-- No corpo do HTML -->
<i class="fa-solid fa-faucet-drip decoration dec-agua"></i>
<i class="fa-solid fa-gavel decoration dec-lei"></i>
<i class="fa-solid fa-brain decoration dec-logica"></i>
<i class="fa-solid fa-folder-tree decoration dec-adm"></i>
